
# ─────────────────────────────────────────────
# 🚨 DATABASE EXTERNE (CNPG)
# ─────────────────────────────────────────────

deployment:
  db:
    enabled: false   # ✅ external CNPG
  minio:
    enabled: false   # ✅ external S3

persistence:
  db:
    enabled: false   # ❌ inutile (CNPG)
  minio:
    enabled: false

# ─────────────────────────────────────────────
# 🔐 SECRETS (VERSION UNIFIÉE)
# ─────────────────────────────────────────────

secret:

  jwt:
    secretRef: supabase-jwt

  db:
    host: supabase-db-rw.supabase.svc.cluster.local
    port: "5432"
    database: supabase
    password: ""   # ⚠️ idéalement ExternalSecret/Vault

  analytics:
    secretRef: supabase-analytics

  smtp:
    secretRef: supabase-smtp

  dashboard:
    secretRef: supabase-dashboard

  s3:
    secretRef: supabase-s3-secret

  realtime:
    secretRef: supabase-realtime


# ─────────────────────────────────────────────
# 🌐 STUDIO
# ─────────────────────────────────────────────

studio:
  environment:
    STUDIO_DEFAULT_ORGANIZATION: "Etama"
    STUDIO_DEFAULT_PROJECT: "etama-main"
    SUPABASE_PUBLIC_URL: "https://supabase.etamcorp.online"
    NEXT_PUBLIC_ENABLE_LOGS: "true"

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    hosts:
      - host: studio.etamcorp.online
        paths:
          - path: /
            pathType: Prefix


# ─────────────────────────────────────────────
# 🌐 KONG API GATEWAY
# ─────────────────────────────────────────────

kong:
  environment:
    KONG_DATABASE: "off"

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: supabase.etamcorp.online
        paths:
          - path: /
            pathType: Prefix


# ─────────────────────────────────────────────
# 🔐 AUTH (GOTRUE)
# ─────────────────────────────────────────────

auth:
  environment:
    API_EXTERNAL_URL: "https://supabase.etamcorp.online"
    GOTRUE_SITE_URL: "https://supabase.etamcorp.online"
    GOTRUE_DISABLE_SIGNUP: "false"
    GOTRUE_MAILER_AUTOCONFIRM: "false"
    GOTRUE_JWT_EXP: "3600"


# ─────────────────────────────────────────────
# 📡 POSTGREST
# ─────────────────────────────────────────────

rest:
  environment:
    PGRST_DB_SCHEMA: "public,storage,graphql_public"
    PGRST_DB_ANON_ROLE: "anon"
    PGRST_DB_POOL: "10"


# ─────────────────────────────────────────────
# ⚡ REALTIME (CNPG + REDIS EXTERNE)
# ─────────────────────────────────────────────

realtime:
  environment:
    DB_HOST: supabase-db-rw.supabase.svc.cluster.local
    DB_PORT: "5432"
    DB_NAME: supabase
    DB_SSL: "true"

    REDIS_URL: "redis://redis-headless.redis.svc.cluster.local:6379"

    FLY_ALLOC_ID: "supabase-realtime"
    FLY_APP_NAME: "realtime"


# ─────────────────────────────────────────────
# 🗄️ STORAGE (S3 EXTERNE)
# ─────────────────────────────────────────────

storage:
  environment:
    STORAGE_BACKEND: s3
    GLOBAL_S3_ENDPOINT: "https://s3.etamcorp.online"
    GLOBAL_S3_PROTOCOL: "https"
    GLOBAL_S3_FORCE_PATH_STYLE: "true"
    STORAGE_S3_BUCKET: "supabase-storage"
    FILE_SIZE_LIMIT: "52428800"


# ─────────────────────────────────────────────
# 📊 ANALYTICS
# ─────────────────────────────────────────────

analytics:
  environment:
    DB_HOSTNAME: supabase-db-rw.supabase.svc.cluster.local
    DB_DATABASE: supabase
    DB_SCHEMA: _analytics


# ─────────────────────────────────────────────
# 🧩 VECTOR (LOGS)
# ─────────────────────────────────────────────

vector:
  volumeMounts:
    - name: pod-logs
      mountPath: /var/log/pods
      readOnly: true

  volumes:
    - name: pod-logs
      hostPath:
        path: /var/log/pods


# ─────────────────────────────────────────────
# 🌐 GLOBAL INGRESS (OPTIONNEL)
# ─────────────────────────────────────────────

ingress:
  enabled: false   # ❌ remplacé par ingress par service